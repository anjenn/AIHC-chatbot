<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minimal Chatbot</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    :root {
      --bg: #111417;
      --panel: rgba(22, 27, 31, 0.88);
      --panel-strong: rgba(14, 18, 21, 0.96);
      --border: rgba(255, 255, 255, 0.08);
      --text: #f3efe7;
      --muted: #9ea5ab;
      --accent: #f2b84b;
      --accent-soft: rgba(242, 184, 75, 0.14);
      --assistant: rgba(255, 255, 255, 0.03);
      --user: rgba(242, 184, 75, 0.12);
      --danger: #ff7f6b;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.38);
      --radius-lg: 24px;
      --radius-md: 18px;
      --radius-sm: 12px;
      --font-sans: "IBM Plex Sans", "Segoe UI", sans-serif;
      --font-mono: "JetBrains Mono", "Consolas", monospace;
    }

    html, body {
      min-height: 100%;
      margin: 0;
      background:
        radial-gradient(circle at top left, rgba(242, 184, 75, 0.18), transparent 26%),
        radial-gradient(circle at top right, rgba(122, 169, 255, 0.12), transparent 24%),
        linear-gradient(180deg, #171c20 0%, #0f1215 48%, #0b0d0f 100%);
      color: var(--text);
      font-family: var(--font-sans);
    }

    body {
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .app-shell {
      width: min(100%, 920px);
      min-height: calc(100dvh - 48px);
      display: grid;
      grid-template-rows: auto 1fr auto;
      border: 1px solid var(--border);
      border-radius: 30px;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(17, 20, 23, 0.9), rgba(9, 12, 14, 0.96));
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 22px 24px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), transparent);
    }

    .header-badge {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 24px rgba(242, 184, 75, 0.7);
    }

    .header-copy {
      display: grid;
      gap: 4px;
    }

    .header-title {
      font-family: var(--font-mono);
      font-size: 0.82rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .header-subtitle {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text);
    }

    .model-tag {
      margin-left: auto;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 8px 12px;
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.03);
    }

    .messages {
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .messages::-webkit-scrollbar {
      width: 10px;
    }

    .messages::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.12);
      border-radius: 999px;
      border: 3px solid transparent;
      background-clip: padding-box;
    }

    .welcome {
      padding: 22px;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      background: linear-gradient(180deg, rgba(242, 184, 75, 0.08), rgba(255, 255, 255, 0.01));
      display: grid;
      gap: 10px;
    }

    .welcome h1 {
      margin: 0;
      font-size: clamp(1.6rem, 2vw, 2.2rem);
      line-height: 1.1;
    }

    .welcome p {
      margin: 0;
      max-width: 60ch;
      color: var(--muted);
      line-height: 1.6;
    }

    .message {
      display: grid;
      grid-template-columns: 78px minmax(0, 1fr);
      gap: 14px;
      padding: 16px 18px;
      border: 1px solid transparent;
      border-radius: var(--radius-md);
      background: var(--assistant);
      animation: rise 180ms ease;
    }

    .message.user {
      background: var(--user);
      border-color: rgba(242, 184, 75, 0.14);
    }

    .message.error {
      border-color: rgba(255, 127, 107, 0.28);
      background: rgba(255, 127, 107, 0.08);
    }

    .message-role {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      padding-top: 4px;
    }

    .message.user .message-role {
      color: var(--accent);
    }

    .message.error .message-role {
      color: var(--danger);
    }

    .message-content {
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.7;
    }

    .message-content.cursor::after {
      content: "|";
      margin-left: 2px;
      color: var(--accent);
      animation: blink 0.9s step-end infinite;
    }

    .composer {
      display: grid;
      gap: 12px;
      padding: 18px 24px 24px;
      border-top: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.01), rgba(255, 255, 255, 0.03));
    }

    .composer-row {
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }

    .input-wrap {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 22px;
      background: var(--panel);
      padding: 12px 14px;
      transition: border-color 140ms ease, transform 140ms ease;
    }

    .input-wrap:focus-within {
      border-color: rgba(242, 184, 75, 0.45);
      transform: translateY(-1px);
    }

    textarea {
      width: 100%;
      min-height: 28px;
      max-height: 180px;
      resize: none;
      border: 0;
      outline: 0;
      padding: 0;
      background: transparent;
      color: var(--text);
      font: inherit;
      line-height: 1.6;
    }

    textarea::placeholder {
      color: var(--muted);
    }

    .send-button,
    .clear-button {
      border: 0;
      border-radius: 18px;
      font-family: var(--font-mono);
      font-size: 0.76rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform 140ms ease, opacity 140ms ease, background 140ms ease;
    }

    .send-button {
      min-width: 120px;
      height: 56px;
      padding: 0 20px;
      background: var(--accent);
      color: #18130b;
      font-weight: 700;
    }

    .send-button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .send-button:not(:disabled):hover,
    .clear-button:hover {
      transform: translateY(-1px);
    }

    .composer-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 0.84rem;
    }

    .status {
      font-family: var(--font-mono);
      font-size: 0.76rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .status.streaming {
      color: var(--accent);
    }

    .clear-button {
      padding: 10px 14px;
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes blink {
      50% {
        opacity: 0;
      }
    }

    @media (max-width: 720px) {
      body {
        padding: 0;
      }

      .app-shell {
        width: 100%;
        min-height: 100dvh;
        border-radius: 0;
      }

      .header,
      .messages,
      .composer {
        padding-left: 16px;
        padding-right: 16px;
      }

      .header {
        flex-wrap: wrap;
      }

      .model-tag {
        margin-left: 0;
      }

      .message {
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .composer-row {
        flex-direction: column;
        align-items: stretch;
      }

      .send-button {
        width: 100%;
        min-width: 0;
      }

      .composer-meta {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <main class="app-shell">
    <header class="header">
      <span class="header-badge" aria-hidden="true"></span>
      <div class="header-copy">
        <div class="header-title">Minimal Chatbot</div>
        <div class="header-subtitle">Streaming replies with FastAPI and vanilla JavaScript</div>
      </div>
      <div class="model-tag">{{ model_name }}</div>
    </header>

    <section class="messages" id="messages" aria-live="polite">
      <div class="welcome" id="welcome-card">
        <h1>Ask anything.</h1>
        <p>
          This chatbot keeps conversation history in your browser, sends it to the FastAPI backend,
          and streams the assistant response back into the interface in real time.
        </p>
      </div>
    </section>

    <section class="composer">
      <div class="composer-row">
        <label class="input-wrap" for="user-input">
          <textarea id="user-input" rows="1" placeholder="Type a message and press Enter"></textarea>
        </label>
        <button class="send-button" id="send-button" type="button">Send</button>
      </div>
      <div class="composer-meta">
        <div class="status" id="status">Ready</div>
        <button class="clear-button" id="clear-button" type="button">Clear history</button>
      </div>
    </section>
  </main>

  <script>
    const history = [];
    let streaming = false;

    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("user-input");
    const sendButtonEl = document.getElementById("send-button");
    const clearButtonEl = document.getElementById("clear-button");
    const statusEl = document.getElementById("status");

    function setStatus(text, isStreaming = false) {
      statusEl.textContent = text;
      statusEl.classList.toggle("streaming", isStreaming);
    }

    function autoResize() {
      inputEl.style.height = "auto";
      inputEl.style.height = `${Math.min(inputEl.scrollHeight, 180)}px`;
    }

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function removeWelcomeCard() {
      const welcomeCard = document.getElementById("welcome-card");
      if (welcomeCard) {
        welcomeCard.remove();
      }
    }

    function createMessage(role, content = "", extraClass = "") {
      removeWelcomeCard();

      const wrapper = document.createElement("article");
      wrapper.className = `message ${role} ${extraClass}`.trim();

      const roleEl = document.createElement("div");
      roleEl.className = "message-role";
      roleEl.textContent = role === "user" ? "You" : role === "assistant" ? "Assistant" : "Error";

      const contentEl = document.createElement("div");
      contentEl.className = "message-content";
      contentEl.textContent = content;

      wrapper.append(roleEl, contentEl);
      messagesEl.appendChild(wrapper);
      scrollToBottom();
      return contentEl;
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || streaming) {
        return;
      }

      createMessage("user", text);
      history.push({ role: "user", content: text });

      inputEl.value = "";
      autoResize();
      inputEl.focus();

      const assistantContentEl = createMessage("assistant");
      assistantContentEl.classList.add("cursor");

      streaming = true;
      sendButtonEl.disabled = true;
      setStatus("Streaming", true);

      try {
        const response = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ messages: history }),
        });

        if (!response.ok) {
          let detail = `HTTP ${response.status}`;
          try {
            const payload = await response.json();
            detail = payload.detail || detail;
          } catch (error) {
            console.error("Failed to parse error response", error);
          }
          throw new Error(detail);
        }

        if (!response.body) {
          throw new Error("Streaming response body is not available.");
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";
        let reply = "";

        while (true) {
          const { value, done } = await reader.read();
          if (done) {
            break;
          }

          buffer += decoder.decode(value, { stream: true });
          const events = buffer.split("\n\n");
          buffer = events.pop() || "";

          for (const event of events) {
            const line = event
              .split("\n")
              .find((entry) => entry.startsWith("data: "));

            if (!line) {
              continue;
            }

            const payload = line.slice(6).trim();
            if (payload === "[DONE]") {
              continue;
            }

            const data = JSON.parse(payload);
            if (data.error) {
              throw new Error(data.error);
            }

            if (data.text) {
              reply += data.text;
              assistantContentEl.textContent = reply;
              scrollToBottom();
            }
          }
        }

        history.push({ role: "assistant", content: reply });
        const turnCount = Math.floor(history.length / 2);
        setStatus(`Ready - ${turnCount} turn${turnCount === 1 ? "" : "s"}`);
      } catch (error) {
        assistantContentEl.parentElement.classList.add("error");
        assistantContentEl.textContent = `Error: ${error.message}`;
        setStatus("Error");
      } finally {
        assistantContentEl.classList.remove("cursor");
        streaming = false;
        sendButtonEl.disabled = false;
      }
    }

    inputEl.addEventListener("input", autoResize);
    inputEl.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    });

    sendButtonEl.addEventListener("click", sendMessage);

    clearButtonEl.addEventListener("click", () => {
      history.length = 0;
      messagesEl.innerHTML = `
        <div class="welcome" id="welcome-card">
          <h1>Ask anything.</h1>
          <p>
            This chatbot keeps conversation history in your browser, sends it to the FastAPI backend,
            and streams the assistant response back into the interface in real time.
          </p>
        </div>
      `;
      setStatus("Ready");
      autoResize();
      inputEl.focus();
    });

    autoResize();
  </script>
</body>
</html>
